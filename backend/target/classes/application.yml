server:
  port: 8080
  tomcat:
    max-http-post-size: 50MB
    max-swallow-size: 50MB

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/luoyang_hanfu?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC&useSSL=false
    username: root
    password: liwenlong
    driver-class-name: com.mysql.cj.jdbc.Driver
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  sql:
    init:
      mode: always
      encoding: UTF-8
      schema-locations: classpath:sql/luoyang_hanfu.sql

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.luoyang.hanfu.entity

jwt:
  secret: "YourJwtSecretKeyReplaceMeWithALongerKeyThatIsAtLeast256BitsLong"
  expiration: 86400000 # 1 day in ms

upload:
  dir: uploads/hanfu

file:
  upload-dir: uploads/hanfu
